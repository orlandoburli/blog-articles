name: Publish to dev.to

on:
  push:
    branches: [main]
    paths: ['articles/**']

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Find new or changed articles
        id: changed
        run: |
          files=$(git diff --name-only HEAD~1 HEAD -- 'articles/' | grep '\.md$' || true)
          echo "files=$files" >> "$GITHUB_OUTPUT"
          if [ -z "$files" ]; then echo "No article changes found"; fi

      - name: Publish to dev.to
        if: steps.changed.outputs.files != ''
        env:
          DEVTO_API_KEY: ${{ secrets.DEVTO_API_KEY }}
        run: |
          for file in ${{ steps.changed.outputs.files }}; do
            echo "Publishing: $file"

            # Extract front matter fields
            title=$(sed -n 's/^title: *"\(.*\)"/\1/p' "$file" | head -1)
            tags=$(sed -n 's/^tags: *"\(.*\)"/\1/p' "$file" | head -1)
            canonical=$(sed -n 's/^canonical_url: *"\(.*\)"/\1/p' "$file" | head -1)
            cover=$(sed -n 's/^cover_image: *"\(.*\)"/\1/p' "$file" | head -1)

            # Get body (everything after the second ---)
            body=$(awk '/^---$/{c++; next} c>=2' "$file")

            # Build JSON payload
            json=$(jq -n \
              --arg title "$title" \
              --arg body "$body" \
              --arg tags "$tags" \
              --arg canonical "$canonical" \
              --arg cover "$cover" \
              '{
                article: {
                  title: $title,
                  body_markdown: $body,
                  published: false,
                  tags: ($tags | split(", ")),
                  canonical_url: (if $canonical != "" then $canonical else null end),
                  main_image: (if $cover != "" then $cover else null end)
                }
              }')

            response=$(curl -s -w "\n%{http_code}" -X POST "https://dev.to/api/articles" \
              -H "Content-Type: application/json" \
              -H "api-key: $DEVTO_API_KEY" \
              -d "$json")

            http_code=$(echo "$response" | tail -1)
            resp_body=$(echo "$response" | sed '$d')

            if [ "$http_code" = "201" ]; then
              url=$(echo "$resp_body" | jq -r '.url')
              echo "Published as draft: $url"
            else
              echo "Failed ($http_code): $resp_body"
              exit 1
            fi
          done
